<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Translate X</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React & Babel Engines directly in-browser -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [sourceText, setSourceText] = useState("");
            const [translatedText, setTranslatedText] = useState("");
            const [targetLang, setTargetLang] = useState("Spanish");
            const [loading, setLoading] = useState(false);
            const [history, setHistory] = useState([]);

            //Change this array to type zour own languages in the dropdown
            const languages = ["Spanish", "French", "German", "Japanese", "Italian", "Chinese", "Arabic"];

            // Fetch history from your FastAPI backend
            const fetchHistory = async () => {
                try {
                    const res = await fetch("http://127.0.0.1:8000/history");
                    const data = await res.json();
                    setHistory(data);
                } catch (err) {
                    console.error("Failed to sync translation history logs:", err);
                }
            };

            useEffect(() => {
                fetchHistory();
            }, []);

            // Trigger translation pipeline
            const handleTranslate = async () => {
                if (!sourceText.trim()) return;
                setLoading(true);
                try {
                    const response = await fetch("http://127.0.0.1:8000/translate", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ text: sourceText, target_lang: targetLang })
                    });
                    const data = await response.json();
                    setTranslatedText(data.translation);
                    fetchHistory(); // Refresh the history block
                } catch (err) {
                    alert("System failed to process downstream translation packet.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div class="max-w-6xl mx-auto p-4 sm:p-8">
                    {/* Header bar */}
                    <header class="mb-8 border-b border-gray-200 pb-4 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-2xl font-bold tracking-tight text-blue-600">AI</span>
                            <span class="text-2xl font-light text-gray-500">Translate Studio</span>
                        </div>
                        <span class="text-xs bg-green-100 text-green-800 px-2.5 py-1 rounded-full font-medium">Gemini-3.5 Active</span>
                    </header>

                    {/* Interactive translation workspace split */}
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        {/* Input block panel */}
                        <div class="bg-white rounded-xl shadow-xs border border-gray-200 p-4 flex flex-col min-h-[280px]">
                            <div class="text-xs font-semibold uppercase tracking-wider text-gray-400 mb-3 pb-2 border-b border-gray-100">Detect Language (Automatic)</div>
                            <textarea 
                                class="w-full flex-1 resize-none border-0 focus:ring-0 text-lg outline-none placeholder-gray-300"
                                placeholder="Type text here to translate..."
                                value={sourceText}
                                onChange={(e) => setSourceText(e.target.value)}
                            />
                            <div class="flex justify-end pt-2 border-t border-gray-50 mt-2">
                                <button 
                                    onClick={handleTranslate}
                                    disabled={loading}
                                    class="bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded-lg transition shadow-xs disabled:opacity-50 text-sm cursor-pointer"
                                >
                                    {loading ? "Translating..." : "Translate"}
                                </button>
                            </div>
                        </div>

                        {/* Output block panel */}
                        <div class="bg-white rounded-xl shadow-xs border border-gray-200 p-4 flex flex-col min-h-[280px]">
                            <div class="mb-3 pb-2 border-b border-gray-100 flex items-center gap-2">
                                <select 
                                    class="text-xs font-semibold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded border-0 outline-none cursor-pointer"
                                    value={targetLang}
                                    onChange={(e) => setTargetLang(e.target.value)}
                                >
                                    {languages.map(lang => (
                                        <option key={lang} value={lang}>{lang}</option>
                                    ))}
                                </select>
                            </div>
                            <div class="w-full flex-1 text-lg text-gray-700 font-light whitespace-pre-wrap">
                                {translatedText || <span class="text-gray-300 italic">Translation will appear here...</span>}
                            </div>
                        </div>
                    </div>

                    {/* Persistent Historical Database Log */}
                    <div class="bg-white rounded-xl shadow-xs border border-gray-200 p-6">
                        <h2 class="text-sm font-semibold text-gray-500 uppercase tracking-wider mb-4 flex items-center gap-2">
                            <span>Translation History Log</span>
                            <span class="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-full">{history.length}</span>
                        </h2>
                        
                        {history.length === 0 ? (
                            <p class="text-gray-400 text-sm italic py-4 text-center">No transactions recorded yet.</p>
                        ) : (
                            <div class="divide-y divide-gray-100 max-h-[350px] overflow-y-auto pr-2">
                                {history.map((item, index) => (
                                    <div key={index} class="py-3.5 first:pt-0 last:pb-0 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div class="space-y-1 max-w-2xl">
                                            <p class="text-sm text-gray-400 font-normal line-clamp-1">{item.source}</p>
                                            <p class="text-base text-gray-800 font-medium">{item.translation}</p>
                                        </div>
                                        <div class="flex items-center gap-3 shrink-0 self-end sm:self-center">
                                            <span class="text-[10px] uppercase font-bold tracking-wider bg-blue-50 text-blue-700 px-2 py-0.5 rounded">
                                                To: {item.lang}
                                            </span>
                                            <span class="text-xs text-gray-400">
                                                {new Date(item.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                            </span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
